[display]
width = 480
height = 800
fps = 30
fullscreen = true

[i2c]
# HyperPixel 4.0 blocks the standard i2c bus (1).
# Connect PCA9685 to the HyperPixel breakout i2c header
# `ls /dev/i2c*` to view available buses. Then `i2cdetect -y XX` to find the address of your PCA9685.
# You should see `40` in one of the entries of the output. This indicates the correct i2c bus number.
bus = 10

[servo.lane_0]
channel = 0
neutral_angle = 130.0
vend_angle = 32.0
sweep_ms = 0
vend_hold_ms = 750
return_ms = 300

[servo.lane_1]
channel = 1
neutral_angle = 130.0
vend_angle = 32.0
sweep_ms = 0
vend_hold_ms = 750
return_ms = 300

[servo.lane_2]
channel = 2
neutral_angle = 130.0
vend_angle = 32.0
sweep_ms = 0
vend_hold_ms = 750
return_ms = 300

[servo.lane_3]
channel = 3
neutral_angle = 130.0
vend_angle = 32.0
sweep_ms = 0
vend_hold_ms = 750
return_ms = 300

[paths]
inventory  = "data/inventory.json"
vend_log   = "data/vend_log.jsonl"
pack_cache = "assets/packs/cache"
placeholder = "assets/ui/placeholder_pack.png"

[ui]
dispensing_display_ms = 3000
screensaver_timeout_s = 60
